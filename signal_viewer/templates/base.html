<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Signal Viewer{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/theme.css?v=31">
  <script src="/static/js/vendor/plotly.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Fixed Navigation Bar -->
  <nav class="navbar">
    <span class="navbar-brand">Signal Viewer</span>
    <ul class="navbar-nav">
      <li><a href="/" class="nav-link" data-page="viewer">Viewer</a></li>
      <li><a href="/analysis" class="nav-link" data-page="analysis">Analysis</a></li>
      <li><a href="/comparison" class="nav-link" data-page="comparison">Comparison</a></li>
      <li><a href="/docs" class="nav-link" data-page="docs">Docs</a></li>
    </ul>
  </nav>

  <!-- File Selector Bar (overrideable) -->
  {% block file_selector %}
  <div class="file-selector-bar" id="fileSelectorBar">
    <div class="form-group">
      <label for="globalRoot">Root</label>
      <select id="globalRoot" onchange="GlobalNav.onRootChange()">
        <option value="">Select root...</option>
      </select>
    </div>
    <div class="form-group">
      <label for="globalSerial">Serial</label>
      <select id="globalSerial" onchange="GlobalNav.onSerialChange()" disabled>
        <option value="">Select serial...</option>
      </select>
    </div>
    <div class="form-group">
      <label for="globalStep">Step</label>
      <select id="globalStep" onchange="GlobalNav.onStepChange()" disabled>
        <option value="">Select step...</option>
      </select>
    </div>
    <div class="form-group">
      <label for="globalFile">File</label>
      <select id="globalFile" onchange="GlobalNav.onFileChange()" disabled>
        <option value="">Select file...</option>
      </select>
    </div>
  </div>
  {% endblock %}

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-text" id="loadingText">Loading...</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loadingBarFill"></div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- App Body -->
  <div class="app-body">
    {% block sidebar %}
    <aside class="signal-sidebar" id="signalSidebar">
      <h4>Signals</h4>
      <div id="sidebarContent">
        <div class="sidebar-empty">Select a file to browse signals</div>
      </div>
    </aside>
    {% endblock %}

    <main class="main-panel" id="mainPanel">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js?v=31"></script>
  <script>
  (function() {
    const path = window.location.pathname;
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute('href') === path) link.classList.add('active');
    });
  })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
