{% extends "base.html" %}

{% block title %}Notes - Signal Viewer{% endblock %}

{% block content %}
<div class="module-header">
  <div class="module-controls">
    <div class="form-group" style="min-width:auto">
      <label>File</label>
      <span id="notesFilePath" class="notes-file-path">No file selected</span>
    </div>
  </div>
</div>

<div class="module-content">
  <div class="notes-layout">
    <!-- Left column: Private Notes -->
    <div class="notes-section">
      <div class="card">
        <div class="card-header">
          <h3>Private Notes</h3>
        </div>
        <div class="card-body">
          <textarea id="privateNote" class="private-note-textarea"
                    placeholder="Write a private note about this file..."></textarea>
          <div class="note-save-row">
            <span class="comment-meta" id="privateNoteMeta"></span>
            <button class="btn btn-sm" onclick="savePrivateNote()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right column: Public Notes -->
    <div class="notes-section">
      <div class="card">
        <div class="card-header">
          <h3>Public Notes</h3>
        </div>
        <div class="card-body">
          <textarea id="publicNoteInput" class="public-note-textarea"
                    placeholder="Enter a public note..."></textarea>
          <div class="note-save-row">
            <button class="btn btn-sm" onclick="addPublicNote()">Add Note</button>
          </div>
          <div id="publicNotesList" style="margin-top: var(--spacing-md)">
            <div class="sidebar-empty">No public notes yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// ============================================================================
// NOTES MODULE
// ============================================================================

let _notesFilePath = null;

async function _initNotes() {
  await GlobalNav._ready;

  GlobalNav.onFileSelected = loadNotes;
  GlobalNav.onSelectionChange = () => {
    _notesFilePath = null;
    _clearNotes();
  };

  if (GlobalNav.filePath) loadNotes();
}

function _buildFilePathDisplay() {
  const parts = [
    GlobalNav.root,
    GlobalNav.serial,
    GlobalNav.step,
    GlobalNav.fileName
  ].filter(Boolean);
  return parts.join(' / ');
}

function _clearNotes() {
  document.getElementById('notesFilePath').textContent = 'No file selected';
  document.getElementById('privateNote').value = '';
  document.getElementById('privateNoteMeta').textContent = '';
  document.getElementById('publicNotesList').innerHTML =
    '<div class="sidebar-empty">No public notes yet</div>';
}

async function loadNotes() {
  _notesFilePath = GlobalNav.filePath;
  if (!_notesFilePath) { _clearNotes(); return; }

  document.getElementById('notesFilePath').textContent = _buildFilePathDisplay();

  try {
    const encoded = encodePath(_notesFilePath);
    const data = await apiFetch(`/api/comments/${encoded}`);

    // Private note
    if (data.private) {
      document.getElementById('privateNote').value = data.private.content;
      document.getElementById('privateNoteMeta').textContent =
        `Saved: ${data.private.updated_at || ''}`;
    } else {
      document.getElementById('privateNote').value = '';
      document.getElementById('privateNoteMeta').textContent = '';
    }

    // Public notes
    const container = document.getElementById('publicNotesList');
    if (data.public && data.public.length > 0) {
      container.innerHTML = '';
      data.public.forEach(c => {
        const div = document.createElement('div');
        div.className = 'public-note-card';
        div.innerHTML = `
          <button class="note-delete" onclick="deletePublicNote(${c.id})" title="Delete">&times;</button>
          <div class="note-header">
            <span class="note-author">${escapeHtml(c.user)}</span>
            <span>${c.created_at || ''}</span>
          </div>
          <div class="note-content">${escapeHtml(c.content)}</div>
        `;
        container.appendChild(div);
      });
    } else {
      container.innerHTML = '<div class="sidebar-empty">No public notes yet</div>';
    }
  } catch (err) {
    showToast(`Failed to load notes: ${err.message}`, 'error');
  }
}

async function savePrivateNote() {
  if (!_notesFilePath) { showToast('Select a file first', 'warning'); return; }
  const content = document.getElementById('privateNote').value;
  try {
    const encoded = encodePath(_notesFilePath);
    await apiPost(`/api/comments/${encoded}`, { content, is_public: false });
    showToast('Private note saved', 'success');
    loadNotes();
  } catch (err) {
    showToast(`Failed to save: ${err.message}`, 'error');
  }
}

async function addPublicNote() {
  if (!_notesFilePath) { showToast('Select a file first', 'warning'); return; }
  const textarea = document.getElementById('publicNoteInput');
  const content = textarea.value.trim();
  if (!content) { showToast('Enter a note first', 'warning'); return; }
  try {
    const encoded = encodePath(_notesFilePath);
    await apiPost(`/api/comments/${encoded}`, { content, is_public: true });
    textarea.value = '';
    showToast('Note added', 'success');
    loadNotes();
  } catch (err) {
    showToast(`Failed to add note: ${err.message}`, 'error');
  }
}

async function deletePublicNote(noteId) {
  if (!_notesFilePath) return;
  try {
    const encoded = encodePath(_notesFilePath);
    await apiFetch(`/api/comments/${encoded}?id=${noteId}`, { method: 'DELETE' });
    showToast('Note deleted', 'success');
    loadNotes();
  } catch (err) {
    showToast(`Failed to delete: ${err.message}`, 'error');
  }
}

document.addEventListener('DOMContentLoaded', _initNotes);
</script>
{% endblock %}
