{% extends "base.html" %}

{% block title %}Viewer - Signal Viewer{% endblock %}

{% block content %}
<!-- Module header (fixed at top of module area — never scrolls) -->
<div class="module-header">
  <div class="module-controls">
    <div class="form-group">
      <label for="layoutSelect">Layout</label>
      <select id="layoutSelect" onchange="setPlotMode(this.value)">
        <option value="overlay">Same Axis</option>
        <option value="subplots">Subplots</option>
      </select>
    </div>
    <div class="form-group">
      <label for="timeSelect">Time</label>
      <select id="timeSelect" onchange="setTimeMode(this.value)">
        <option value="absolute">Absolute</option>
        <option value="relative">Relative</option>
      </select>
    </div>
    <div class="flex-1"></div>
    <button id="resetZoomBtn" class="btn btn-secondary btn-sm" onclick="_resetToOverview()" style="display:none">Reset Zoom</button>
    <button class="btn btn-secondary btn-sm" onclick="clearAll()">Clear All</button>
  </div>
  <div class="signal-cards-toggle" id="cardsToggle" onclick="toggleCardsVisibility()">
    <span class="toggle-arrow">&#9660;</span> <span>SIGNAL CARDS</span>
  </div>
  <div id="signalCards" class="signal-cards-row"></div>
</div>

<!-- Scrollable content area -->
<div class="module-content">
  <div class="plot-wrapper flex-fill">
    <div id="plotArea" class="plot-area"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// ============================================================================
// VIEWER MODULE — ADAPTIVE ZOOM  (v3 – linear axis, zero timezone ambiguity)
// ============================================================================

const MAX_SIGNALS = 5;
const OVERLAY_HEIGHT = 520;
const SUBPLOT_HEIGHT_PER = 300;
const ZOOM_DOWNSAMPLE = 8000;          // points per zoom request
const ZOOM_DEBOUNCE_MS = 150;          // debounce zoom re-fetches

let plotMode = 'overlay';

/**
 * Signal object:
 * {
 *   batch, idx, name, units, color,
 *   timeRaw:      number[],  // epoch ms — CURRENT view (downsampled)
 *   values:       number[],  // signal values of CURRENT view
 *   totalSamples: number,    // full signal sample count
 *   tStart:       number,    // epoch ms of first sample (full signal)
 *   tEnd:         number,    // epoch ms of last sample  (full signal)
 * }
 *
 * NOTE: Plotly receives timeRaw (epoch ms numbers) on a type:'linear' axis
 * with custom tickvals/ticktext for human-readable time labels.  This fully
 * eliminates timezone-parsing bugs: Plotly never converts to/from date strings,
 * so relayout events return pure numbers with zero offset drift.
 */
const signals = [];

let _plotEl = null;
let _zoomTimer = null;
let _zoomAbort = null;   // AbortController for in-flight zoom fetches
let _lastFetchedRange = null;    // { tMin, tMax } or null (full overview)
let _lastPlotRange = null;       // { lo, hi } — x range set by last Plotly.newPlot (echo detection)

/**
 * Custom modebar button that resets to full overview.
 * We MUST replace Plotly's built-in "Reset axes" and "Autoscale" buttons
 * because Plotly.newPlot() resets the "initial state" to the zoomed layout,
 * making the built-in buttons reset to the zoomed view (not overview).
 */
const _resetModebarBtn = {
  name: 'Reset zoom (full signal)',
  icon: {
    width: 1000, height: 1000,
    path: 'M500 925L75 550h125v-400h225V425h150v-275h225V550h125L500 925z',
    ascent: 950, descent: -50
  },
  click: function() { _resetToOverview(); }
};

/** Shared Plotly config — removes broken built-in buttons, adds our reset. */
const _PLOTLY_CFG = {
  responsive: true,
  displayModeBar: true,
  displaylogo: false,
  showLink: false,
  doubleClick: false,   // disable built-in "double click to zoom out" (we handle it ourselves)
  showTips: false,      // suppress "Double-click to zoom back out" notification banner
  modeBarButtonsToRemove: ['lasso2d', 'select2d', 'resetScale2d', 'autoScale2d'],
  modeBarButtonsToAdd: [_resetModebarBtn]
};

// ── Helpers ───────────────────────────────────────────────────────────────

/** Client-side diagnostic logger.  Writes to the browser console AND
 *  accumulates a rolling buffer (last 200 entries) that can be dumped
 *  from DevTools via `window.__svLog`.
 */
const _LOG_BUF_MAX = 200;
const _logBuf = [];
function _log(level, ...args) {
  const ts = new Date().toISOString();
  const msg = `[SV ${ts}] ${args.map(a => (typeof a === 'object' ? JSON.stringify(a) : a)).join(' ')}`;
  _logBuf.push(msg);
  if (_logBuf.length > _LOG_BUF_MAX) _logBuf.shift();
  if (level === 'error') console.error(msg);
  else if (level === 'warn') console.warn(msg);
  else console.log(msg);
}
window.__svLog = _logBuf;  // accessible from DevTools: copy(window.__svLog.join('\n'))

/** Safe min/max over an array — avoids Function.prototype.apply stack overflow
 *  that crashes Firefox/Chrome tabs with large typed arrays (>~100 k elements).
 */
function safeMin(arr) {
  let m = Infinity;
  for (let i = 0, n = arr.length; i < n; i++) { if (arr[i] < m) m = arr[i]; }
  return m;
}
function safeMax(arr) {
  let m = -Infinity;
  for (let i = 0, n = arr.length; i < n; i++) { if (arr[i] > m) m = arr[i]; }
  return m;
}

/** Maximum number of points per trace before we refuse to plot and warn.
 *  Prevents the browser from allocating multi-GB WebGL buffers that crash
 *  the renderer process.  The server already downsamples, so hitting this
 *  cap indicates a bug or misconfiguration.
 */
const CLIENT_MAX_POINTS = 500000;

/**
 * Build custom tick labels for a linear x-axis that displays epoch ms as
 * human-readable time strings.  Returns { tickvals, ticktext } for the
 * given [lo, hi] epoch ms range.  Uses ~8-12 nicely spaced ticks.
 *
 * By using a LINEAR axis with custom ticks we eliminate ALL date-string
 * parsing by Plotly, which was the root cause of the ±1 h timezone drift
 * on zoom cycles.
 */
function _buildTimeTicks(lo, hi) {
  if (!isFinite(lo) || !isFinite(hi) || lo >= hi) return {};

  const span = hi - lo;
  // Choose a "nice" tick step in ms
  const niceSteps = [
    1, 2, 5, 10, 20, 50, 100, 200, 500,            // sub-second
    1000, 2000, 5000, 10000, 15000, 30000,           // seconds
    60000, 120000, 300000, 600000, 900000, 1800000,   // minutes
    3600000, 7200000, 14400000, 21600000, 43200000,   // hours
    86400000, 172800000, 604800000                    // days
  ];
  const rawStep = span / 10;
  let step = niceSteps[niceSteps.length - 1];
  for (let i = 0; i < niceSteps.length; i++) {
    if (niceSteps[i] >= rawStep) { step = niceSteps[i]; break; }
  }

  const first = Math.ceil(lo / step) * step;
  const tickvals = [];
  const ticktext = [];
  for (let v = first; v <= hi; v += step) {
    tickvals.push(v);
    ticktext.push(_tickLabel(v, step));
  }
  return { tickvals, ticktext };
}

/** Format a single tick label based on the tick step size. */
function _tickLabel(ms, step) {
  const d = new Date(ms);
  const pad = (n) => String(n).padStart(2, '0');
  const H = pad(d.getUTCHours());
  const M = pad(d.getUTCMinutes());
  const S = pad(d.getUTCSeconds());
  const ms_ = d.getUTCMilliseconds();

  if (step >= 86400000) {
    return `${d.getUTCFullYear()}/${pad(d.getUTCMonth()+1)}/${pad(d.getUTCDate())}`;
  }
  if (step >= 1000) {
    return `${H}:${M}:${S}`;
  }
  return `${H}:${M}:${S}.${String(ms_).padStart(3, '0')}`;
}

function formatEpochMs(ms) {
  const d = new Date(ms);
  const pad = (n) => String(n).padStart(2, '0');
  // Seconds with 4 decimal places (sub-ms precision from float64 epoch ms)
  const sec = d.getUTCSeconds();
  const frac = (d.getUTCMilliseconds() + (ms - Math.floor(ms))) / 1000;
  const secStr = (sec + frac).toFixed(4).padStart(7, '0');
  return `${d.getUTCFullYear()}/${pad(d.getUTCMonth() + 1)}/${pad(d.getUTCDate())} ` +
         `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${secStr}`;
}

function computeYRange(arraysOfValues) {
  let min = Infinity, max = -Infinity;
  arraysOfValues.forEach(arr => {
    for (let i = 0; i < arr.length; i++) {
      const v = arr[i];
      if (v < min) min = v;
      if (v > max) max = v;
    }
  });
  if (!isFinite(min)) return [0, 1];
  const span = max - min || 1;
  return [min - 0.05 * span, max + 0.05 * span];
}

function legendLabel(sig) {
  const base = [sig.batch, displayName(sig.name)].filter(Boolean).join(' / ');
  return sig.units ? fmtHtml(base) + ' (' + fmtHtml(sig.units) + ')' : fmtHtml(base);
}

function bsClosest(arr, target) {
  let lo = 0, hi = arr.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid] < target) lo = mid + 1; else hi = mid;
  }
  if (lo > 0 && Math.abs(arr[lo - 1] - target) < Math.abs(arr[lo] - target)) return lo - 1;
  return lo;
}

// ── Signal management ─────────────────────────────────────────────────────

async function addSignal(batch, idx, name, units) {
  if (signals.length >= MAX_SIGNALS) {
    showToast(`Maximum ${MAX_SIGNALS} signals`, 'warning');
    return;
  }

  const key = `${batch}::${idx}`;
  if (signals.some(s => `${s.batch}::${s.idx}` === key)) {
    return;  // already loaded — toggle handled by onSidebarSignalClick
  }

  try {
    showLoading('Loading signal\u2026', { sampleCount: ZOOM_DOWNSAMPLE });
    const url = GlobalNav.signalUrl(batch, idx, ZOOM_DOWNSAMPLE);
    const data = await apiFetch(url);
    hideLoading();

    // Safety cap: refuse to plot if server returned far more points than expected
    const nPts = data.time ? data.time.length : 0;
    _log('info', `addSignal ${batch}/${idx}: ${nPts} pts received (total ${data.total_samples || '?'})`);
    if (nPts > CLIENT_MAX_POINTS) {
      _log('warn', `Signal too large (${nPts} > ${CLIENT_MAX_POINTS}). Refusing to plot to avoid crash.`);
      showToast(`Signal has ${nPts.toLocaleString()} points — too large for the browser. Try a smaller downsample target.`, 'error');
      return;
    }

    signals.push({
      batch, idx,
      name: data.name || name,
      units: data.units || units,
      timeRaw:  data.time,
      values:   data.values,
      totalSamples: data.total_samples || data.samples,
      tStart: data.t_start,
      tEnd:   data.t_end,
      color: getSignalColor(signals.length)
    });

    _lastFetchedRange = null;
    renderAll();
  } catch (err) {
    hideLoading();
    showToast(`Failed to load signal: ${err.message}`, 'error');
  }
}

function removeSignal(index) {
  const wasZoomed = _lastFetchedRange;
  signals.splice(index, 1);
  signals.forEach((s, i) => { s.color = getSignalColor(i); });
  if (signals.length === 0) {
    _cancelZoom();
    _lastFetchedRange = null;
    renderAll();
  } else if (wasZoomed) {
    // Immediately re-render remaining signals at the zoomed range
    // (using their existing data). _reactPlot sets _lastPlotRange which
    // causes onRelayout to ignore the echo Plotly fires back.
    _reactPlot(wasZoomed.tMin, wasZoomed.tMax);
    renderCards();
    updateSidebarActive();
    saveState();
    // Re-fetch remaining signals at the saved zoom range
    _scheduleZoomFetch(wasZoomed.tMin, wasZoomed.tMax);
  } else {
    _lastFetchedRange = null;
    renderAll();
  }
}

function clearAll() {
  signals.length = 0;
  _cancelZoom();
  _lastFetchedRange = null;
  renderAll();
}

function setPlotMode(mode) {
  plotMode = mode;
  const wasZoomed = _lastFetchedRange !== null;
  _lastFetchedRange = null;
  if (wasZoomed && signals.length > 0) {
    _cancelZoom();
    _doZoomFetch(null, null, null, null);
    updateSidebarActive();
  } else {
    renderAll();
  }
}

// ── Time mode (Absolute / Relative) ──────────────────────────────────────

let timeMode = 'absolute';

function setTimeMode(mode) {
  timeMode = mode;
  renderAll();
}

/**
 * Transform time arrays according to the current time mode.
 * - absolute: raw epoch ms (unchanged)
 * - relative: offset from the earliest t0 across all signals, in seconds
 */
function getDisplayTime(sig) {
  if (timeMode === 'relative' && signals.length > 0) {
    const globalT0 = Math.min(...signals.map(s => s.tStart));
    return sig.timeRaw.map(t => (t - globalT0) / 1000.0);
  }
  return sig.timeRaw;
}

function getDisplayTimeRange() {
  if (timeMode === 'relative' && signals.length > 0) {
    const globalT0 = Math.min(...signals.map(s => s.tStart));
    let lo = Infinity, hi = -Infinity;
    signals.forEach(s => {
      const rLo = (safeMin(s.timeRaw) - globalT0) / 1000.0;
      const rHi = (safeMax(s.timeRaw) - globalT0) / 1000.0;
      if (rLo < lo) lo = rLo;
      if (rHi > hi) hi = rHi;
    });
    return { lo, hi };
  }
  let lo = Infinity, hi = -Infinity;
  signals.forEach(s => {
    const sLo = safeMin(s.timeRaw), sHi = safeMax(s.timeRaw);
    if (sLo < lo) lo = sLo;
    if (sHi > hi) hi = sHi;
  });
  return { lo, hi };
}

// ── Collapsible signal cards ─────────────────────────────────────────────

function toggleCardsVisibility() {
  const cards = document.getElementById('signalCards');
  const toggle = document.getElementById('cardsToggle');
  if (!cards || !toggle) return;
  const hidden = cards.style.display === 'none';
  cards.style.display = hidden ? 'flex' : 'none';
  toggle.classList.toggle('collapsed', !hidden);
}

// ── Rendering ─────────────────────────────────────────────────────────────

function renderAll() {
  renderCards();
  renderPlot();
  updateSidebarActive();
  saveState();
}

function updateSidebarActive() {
  GlobalNav.updateSidebarHighlights(
    signals.map(s => ({ batch: s.batch, idx: s.idx, color: s.color }))
  );
}

function renderCards() {
  const container = document.getElementById('signalCards');
  container.innerHTML = '';

  signals.forEach((sig, i) => {
    const card = document.createElement('div');
    card.className = 'signal-card';
    card.style.borderLeftColor = sig.color;
    const ratio = sig.totalSamples ? sig.values.length + '/' + sig.totalSamples.toLocaleString() : '';
    card.innerHTML = `
      <div class="card-close" onclick="removeSignal(${i})">\u2715</div>
      <div class="card-batch">${fmtHtml(sig.batch)}</div>
      <div class="card-name" style="color:${sig.color}">${fmtHtml(displayName(sig.name))}</div>
      <div class="card-value-row">
        <span class="card-value" id="cv-${i}">--</span>
        <span class="card-units">${fmtHtml(sig.units) || ''}</span>
      </div>
      <div class="card-hover-info" id="chi-${i}"></div>
      <div class="card-sample" id="cs-${i}">${ratio ? 'pts ' + ratio : ''}</div>
    `;
    container.appendChild(card);
  });

  // Update toggle visibility
  const toggle = document.getElementById('cardsToggle');
  if (toggle) toggle.style.display = signals.length > 0 ? 'flex' : 'none';
}

// ── Plotting ──────────────────────────────────────────────────────────────

/**
 * Shared x-axis config.  Uses type:'linear' so Plotly stores and returns
 * raw epoch ms numbers — no date-string conversion, no timezone ambiguity.
 * Custom tick labels are provided via tickvals/ticktext.
 */
function _xAxisConfig(extra) {
  return {
    ...PLOT_CONFIG.axis,
    title: { text: timeMode === 'relative' ? 'Time (h:m:s)' : 'Time (h:m:s)' },
    type: 'linear',
    ...extra
  };
}

/**
 * Build tick labels for relative time axis.
 * Input values are in seconds. Formats as H:MM:SS or H:MM:SS.mmm.
 */
function _buildRelativeTimeTicks(loSec, hiSec) {
  if (!isFinite(loSec) || !isFinite(hiSec) || loSec >= hiSec) return {};

  const span = hiSec - loSec;
  // Choose nice step in seconds
  const niceSteps = [
    0.001, 0.002, 0.005, 0.01, 0.02, 0.05, 0.1, 0.2, 0.5,
    1, 2, 5, 10, 15, 30,
    60, 120, 300, 600, 900, 1800,
    3600, 7200, 14400, 21600, 43200,
    86400
  ];
  const rawStep = span / 10;
  let step = niceSteps[niceSteps.length - 1];
  for (let i = 0; i < niceSteps.length; i++) {
    if (niceSteps[i] >= rawStep) { step = niceSteps[i]; break; }
  }

  const first = Math.ceil(loSec / step) * step;
  const tickvals = [];
  const ticktext = [];
  for (let v = first; v <= hiSec; v += step) {
    tickvals.push(v);
    ticktext.push(_relTickLabel(v, step));
  }
  return { tickvals, ticktext };
}

/** Format relative seconds as H:MM:SS or H:MM:SS.mmm */
function _relTickLabel(totalSec, step) {
  const neg = totalSec < 0;
  const abs = Math.abs(totalSec);
  const h = Math.floor(abs / 3600);
  const m = Math.floor((abs % 3600) / 60);
  const s = abs % 60;
  const pad2 = (n) => String(n).padStart(2, '0');
  const prefix = neg ? '-' : '';

  if (step >= 1) {
    return `${prefix}${h}:${pad2(m)}:${pad2(Math.floor(s))}`;
  }
  // Sub-second: include milliseconds
  const sFloor = Math.floor(s);
  const ms = Math.round((s - sFloor) * 1000);
  return `${prefix}${h}:${pad2(m)}:${pad2(sFloor)}.${String(ms).padStart(3, '0')}`;
}

function renderPlot() {
  const el = document.getElementById('plotArea');
  if (signals.length === 0) {
    Plotly.purge(el);
    Plotly.newPlot(el, [], {
      xaxis: { visible: false }, yaxis: { visible: false },
      plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
      margin: PLOT_CONFIG.margin,
      annotations: [{
        text: 'Click a signal in the sidebar to begin',
        xref: 'paper', yref: 'paper', x: 0.5, y: 0.5,
        showarrow: false, font: { size: 14, color: '#8e90a6' }
      }]
    }, { responsive: true, displaylogo: false, showLink: false });
    _plotEl = null;
    _updateZoomIndicator(null);
    return;
  }

  if (plotMode === 'overlay') plotOverlay(el);
  else plotSubplots(el);

  // Attach event listeners (Plotly.newPlot purges old ones)
  el.on('plotly_hover', onHover);
  el.on('plotly_unhover', onUnhover);
  el.on('plotly_relayout', onRelayout);
  el.on('plotly_doubleclick', onDoubleClick);

  _plotEl = el;
  // Preserve zoom indicator if we are currently zoomed (e.g. time mode switch)
  if (!_lastFetchedRange) {
    _updateZoomIndicator(null);
  }
}

function plotOverlay(el) {
  const totalPts = signals.reduce((s, sig) => s + sig.timeRaw.length, 0);
  _log('info', `plotOverlay: ${signals.length} signals, ${totalPts} total points`);
  const traces = signals.map(sig => ({
    x: getDisplayTime(sig), y: sig.values,
    name: legendLabel(sig),
    type: 'scattergl', mode: 'lines',
    line: { color: sig.color, width: 1.5 },
    hoverinfo: 'none'
  }));

  const yRange = computeYRange(signals.map(s => s.values));

  const range = getDisplayTimeRange();
  const pad = (range.hi - range.lo) * 0.01 || 1;
  const xLo = range.lo - pad, xHi = range.hi + pad;
  const ticks = timeMode === 'absolute'
    ? _buildTimeTicks(xLo, xHi)
    : _buildRelativeTimeTicks(xLo, xHi);

  const layout = {
    xaxis: _xAxisConfig({
      range: [xLo, xHi], autorange: false,
      showspikes: true, spikemode: 'across', spikethickness: 1,
      spikecolor: '#999', spikesnap: 'cursor', spikedash: 'solid',
      ...ticks
    }),
    yaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: (signals.length === 1 && signals[0].units)
        ? fmtHtml(signals[0].units)
        : 'Value' },
      range: yRange, autorange: false
    },
    dragmode: 'zoom',
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    height: OVERLAY_HEIGHT,
    margin: PLOT_CONFIG.margin,
    hovermode: 'x', hoverdistance: -1,
    showlegend: true,
    legend: { x: 0.01, y: 0.99, ...PLOT_CONFIG.legend }
  };

  _lastPlotRange = { lo: xLo, hi: xHi };

  Plotly.purge(el);  // release previous WebGL contexts (harmless in SVG mode)
  Plotly.newPlot(el, traces, layout, _PLOTLY_CFG);
}

function plotSubplots(el) {
  const totalPts = signals.reduce((s, sig) => s + sig.timeRaw.length, 0);
  _log('info', `plotSubplots: ${signals.length} signals, ${totalPts} total points`);
  const n = signals.length;
  const totalHeight = 100 + n * SUBPLOT_HEIGHT_PER;
  const gap = 0.08;
  const hPerSub = (1 - (n - 1) * gap) / n;

  const traces = [];
  const layout = {
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    height: totalHeight, margin: PLOT_CONFIG.margin,
    hovermode: 'x', hoverdistance: -1,
    showlegend: true,
    dragmode: 'zoom'
  };

  // Compute explicit synced time range for ALL subplot axes
  const range = getDisplayTimeRange();
  const pad = (range.hi - range.lo) * 0.01 || 1;
  const xLo = range.lo - pad, xHi = range.hi + pad;
  const ticks = timeMode === 'absolute'
    ? _buildTimeTicks(xLo, xHi)
    : _buildRelativeTimeTicks(xLo, xHi);
  const xRange = { range: [xLo, xHi], autorange: false, ...ticks };

  signals.forEach((sig, i) => {
    const yRange = computeYRange([sig.values]);
    const domBot = 1 - (i + 1) * hPerSub - i * gap;
    const domTop = domBot + hPerSub;

    const xKey = i === 0 ? 'xaxis' : `xaxis${i + 1}`;
    const yKey = i === 0 ? 'yaxis' : `yaxis${i + 1}`;
    const legendKey = i === 0 ? 'legend' : `legend${i + 1}`;

    // Every axis gets same explicit range — no matches, full control
    layout[xKey] = _xAxisConfig({
      anchor: i === 0 ? 'y' : `y${i + 1}`,
      ...xRange
    });
    const yLabel = sig.units ? fmtHtml(sig.units) : 'Value';
    layout[yKey] = {
      ...PLOT_CONFIG.axis,
      title: { text: yLabel },
      domain: [domBot, domTop], range: yRange, autorange: false,
      anchor: i === 0 ? 'x' : `x${i + 1}`
    };

    layout[legendKey] = {
      x: 0.01, y: domTop, xanchor: 'left', yanchor: 'top',
      ...PLOT_CONFIG.legend
    };

    traces.push({
      x: getDisplayTime(sig), y: sig.values,
      name: legendLabel(sig),
      type: 'scattergl', mode: 'lines',
      line: { color: sig.color, width: 1.5 },
      hoverinfo: 'none',
      xaxis: i === 0 ? 'x' : `x${i + 1}`,
      yaxis: i === 0 ? 'y' : `y${i + 1}`,
      legend: legendKey
    });
  });

  _lastPlotRange = { lo: xLo, hi: xHi };

  Plotly.purge(el);  // release previous WebGL contexts before creating new ones
  Plotly.newPlot(el, traces, layout, _PLOTLY_CFG);
}

// ============================================================================
// ADAPTIVE ZOOM ENGINE
// ============================================================================

/**
 * Force a full-overview reset: cancel any in-flight zoom, fetch overview,
 * and re-render with the complete signal.
 *
 * Called from: double-click handler, custom modebar button, HTML reset button.
 * Runs the fetch IMMEDIATELY (no debounce) so the user sees feedback fast.
 */
function _resetToOverview() {
  if (_lastFetchedRange === null) {
    // Already at overview — but still re-render to fix any visual issues
    if (signals.length > 0) {
      _reactPlot(null, null);
      _updateZoomIndicator(null);
    }
    return;
  }
  _cancelZoom();
  // Immediate fetch — reset is a deliberate user action, no debounce needed
  _doZoomFetch(null, null, null, null);
}

/**
 * Handle Plotly relayout events — specifically, user-initiated zoom/pan.
 *
 * KEY DESIGN DECISIONS:
 *
 * 1. We ONLY process explicit range-change events (xaxis.range[0]/[1]).
 *    Autorange events (xaxis.autorange=true) are NEVER handled here because
 *    we've disabled every Plotly feature that produces them:
 *      - doubleClick: false  (in Plotly config)
 *      - Removed resetScale2d & autoScale2d modebar buttons
 *    Our own reset is handled via plotly_doubleclick event and custom buttons,
 *    which call _resetToOverview() directly.  Therefore, every autorange event
 *    in relayout is an echo from our own Plotly.newPlot() calls and is ignored.
 *
 * 2. Echo detection uses RANGE COMPARISON, not timing or boolean flags.
 *    After every Plotly.newPlot(), we record the range in _lastPlotRange.
 *    If a relayout event reports the same range, it's an echo and is skipped.
 *    This is deterministic — no race conditions, no timing windows.
 *
 * Scans ALL xaxis keys so that zooming on any subplot is detected.
 * Because the x-axis is type:'linear', all range values are plain numbers.
 */
function onRelayout(eventData) {
  if (!eventData) return;

  const keys = Object.keys(eventData);

  // ── Extract range change from ANY x-axis (subplot support) ────────────
  let tMin, tMax;

  // Form 1:  xaxis.range[0] / xaxis.range[1]  (or xaxis2.range[0], etc.)
  for (const key of keys) {
    const m = key.match(/^(xaxis\d*)\.range\[0\]$/);
    if (m) {
      const ax = m[1];
      const r0 = Number(eventData[`${ax}.range[0]`]);
      const r1 = Number(eventData[`${ax}.range[1]`]);
      if (isFinite(r0) && isFinite(r1) && r0 < r1) {
        tMin = r0;  tMax = r1;
        break;
      }
    }
  }

  // Form 2:  xaxis.range = [lo, hi]  (array form)
  if (tMin == null) {
    for (const key of keys) {
      const m = key.match(/^(xaxis\d*)\.range$/);
      if (m && Array.isArray(eventData[key]) && eventData[key].length >= 2) {
        const r0 = Number(eventData[key][0]);
        const r1 = Number(eventData[key][1]);
        if (isFinite(r0) && isFinite(r1) && r0 < r1) {
          tMin = r0;  tMax = r1;
          break;
        }
      }
    }
  }

  // No range data → not a zoom/pan event (autorange, shapes, etc.) → ignore
  if (tMin == null || tMax == null) return;

  // ── Echo detection: ignore range events that mirror what we just set ───
  // After _reactPlot/plotOverlay/plotSubplots call Plotly.newPlot() with an
  // explicit range, Plotly fires back a relayout with that same range.
  // Tolerance of 0.5 handles float rounding.
  if (_lastPlotRange &&
      Math.abs(_lastPlotRange.lo - tMin) < 0.5 &&
      Math.abs(_lastPlotRange.hi - tMax) < 0.5) {
    return;
  }

  // Skip if we already fetched this exact display range
  if (_lastFetchedRange &&
      Math.abs(_lastFetchedRange.tMin - tMin) < 0.5 &&
      Math.abs(_lastFetchedRange.tMax - tMax) < 0.5) {
    return;
  }

  _scheduleZoomFetch(tMin, tMax);
}

/**
 * Handle double-click on the plot → reset to full overview.
 * Returns false to PREVENT Plotly's built-in autorange, which would just
 * autorange to the current (zoomed) data extent — not the full signal.
 * We handle the reset ourselves via _resetToOverview().
 */
function onDoubleClick() {
  _resetToOverview();
  return false;   // ← suppress Plotly default autorange
}

function _cancelZoom() {
  if (_zoomTimer) { clearTimeout(_zoomTimer); _zoomTimer = null; }
  if (_zoomAbort) { _zoomAbort.abort(); _zoomAbort = null; }
}

/**
 * Schedule a zoom fetch after a debounce delay.
 *
 * Uses the relayout event values directly as the display range — do NOT
 * re-read from Plotly internals, because in subplot mode the axis that was
 * zoomed (e.g. xaxis2) is different from the primary (xaxis), and reading
 * the primary would overwrite the zoom range with the overview range.
 *
 * A small margin (2%) is added on each side of the display range so the
 * fetched data extends just beyond the visible edges for clean rendering.
 * The server also expands the slice by ~2% in sample space, so the
 * combined margin is sufficient for LTTB to produce clean edge points
 * without wasting the point budget on large off-screen regions.
 */
function _scheduleZoomFetch(tMin, tMax) {
  _cancelZoom();
  _zoomTimer = setTimeout(() => {
    // Display range = exactly what the relayout event reported (in display coords)
    const displayMin = tMin, displayMax = tMax;

    // Convert display coords to epoch ms for the API fetch.
    // Use a 2% margin on each side — just enough for clean edge rendering.
    // (The server adds its own ~2% sample expansion on top of this.)
    let fetchMin, fetchMax;
    if (timeMode === 'relative' && signals.length > 0) {
      const globalT0 = Math.min(...signals.map(s => s.tStart));
      const apiMin = globalT0 + tMin * 1000.0;
      const apiMax = globalT0 + tMax * 1000.0;
      const margin = (apiMax - apiMin) * 0.02;
      fetchMin = apiMin - margin;
      fetchMax = apiMax + margin;
    } else {
      const margin = (displayMax - displayMin) * 0.02;
      fetchMin = displayMin - margin;
      fetchMax = displayMax + margin;
    }
    _doZoomFetch(fetchMin, fetchMax, displayMin, displayMax);
  }, ZOOM_DEBOUNCE_MS);
}

/**
 * Fetch fresh data for each signal within [fetchMin, fetchMax].
 * Display range [displayMin, displayMax] is used for the axis range
 * (typically the visible area without margins).
 * If fetchMin/fetchMax are null, fetches the full overview.
 */
async function _doZoomFetch(fetchMin, fetchMax, displayMin, displayMax) {
  if (signals.length === 0) return;
  _log('info', `_doZoomFetch: fetch=[${fetchMin}, ${fetchMax}], display=[${displayMin}, ${displayMax}]`);

  // Abort any previous in-flight zoom fetches
  if (_zoomAbort) _zoomAbort.abort();
  _zoomAbort = new AbortController();
  const { signal: abortSignal } = _zoomAbort;

  _updateZoomIndicator('loading');

  // Use display range for the duplicate-fetch guard and _reactPlot
  const dMin = displayMin != null ? displayMin : null;
  const dMax = displayMax != null ? displayMax : null;

  try {
    // Fire all signal fetches in parallel
    const fetches = signals.map(sig => {
      let url = GlobalNav.signalUrl(sig.batch, sig.idx, ZOOM_DOWNSAMPLE);
      if (fetchMin != null && fetchMax != null) {
        url += `&t_min=${fetchMin}&t_max=${fetchMax}`;
      }
      return apiFetch(url, { signal: abortSignal });
    });

    const results = await Promise.all(fetches);

    // Check abort wasn't called while we waited
    if (abortSignal.aborted) return;

    // Update each signal's display data (guard against empty responses + safety cap)
    let anyData = false;
    let tooBig = false;
    results.forEach((data, i) => {
      if (data.time && data.time.length > 0 && data.values && data.values.length > 0) {
        const n = data.time.length;
        if (n > CLIENT_MAX_POINTS) {
          _log('warn', `Zoom fetch signal ${i}: ${n} pts exceeds cap ${CLIENT_MAX_POINTS}, skipping`);
          tooBig = true;
          return;
        }
        signals[i].timeRaw = data.time;
        signals[i].values  = data.values;
        anyData = true;
      }
    });
    if (tooBig) {
      _log('warn', 'One or more zoom fetch responses exceeded client safety cap');
    }

    if (!anyData) {
      _log('warn', 'Zoom fetch returned no data for any signal');
      _updateZoomIndicator('error');
      return;
    }

    // Track what range we just fetched (for duplicate-fetch guard)
    // Use display range so matching works against relayout events
    _lastFetchedRange = (dMin != null && dMax != null) ? { tMin: dMin, tMax: dMax } : null;

    // Re-render with DISPLAY range (not the wider fetch range)
    _reactPlot(dMin, dMax);
    renderCards();
    saveState();

    // Compute zoom level for indicator (reset zoom button visibility)
    if (dMin != null && dMax != null) {
      let fullSpan;
      if (timeMode === 'relative' && signals.length > 0) {
        const globalT0 = Math.min(...signals.map(s => s.tStart));
        const totalLo = Math.min(...signals.map(s => (s.tStart - globalT0) / 1000.0));
        const totalHi = Math.max(...signals.map(s => (s.tEnd - globalT0) / 1000.0));
        fullSpan = totalHi - totalLo;
      } else {
        fullSpan = 0;
        signals.forEach(s => { const sp = s.tEnd - s.tStart; if (sp > fullSpan) fullSpan = sp; });
      }
      const viewSpan = dMax - dMin;
      const zoomPct = fullSpan > 0 ? ((viewSpan / fullSpan) * 100) : 100;
      _updateZoomIndicator(zoomPct);
    } else {
      _updateZoomIndicator(null);
    }

  } catch (err) {
    if (err.name === 'AbortError') return; // expected on rapid zoom
    _log('error', 'Zoom fetch failed:', err.message, err.stack);
    _updateZoomIndicator('error');
  }
}

/**
 * Re-render the plot with fresh data after a zoom fetch.
 *
 * Uses Plotly.newPlot() instead of Plotly.react() to guarantee a complete
 * WebGL buffer refresh — scattergl traces can show stale data on partial
 * buffer updates when the data array length changes significantly.
 *
 * Event listeners are re-attached after each newPlot (Plotly purges them).
 */
function _reactPlot(tMin, tMax) {
  const el = _plotEl || document.getElementById('plotArea');
  if (!el) return;
  const totalPts = signals.reduce((s, sig) => s + sig.timeRaw.length, 0);
  _log('info', `_reactPlot(${tMin}, ${tMax}): ${signals.length} signals, ${totalPts} total points, mode=${plotMode}`);

  // Always compute EXPLICIT x range — NEVER use autorange: true.
  // autorange: true triggers async relayout events from Plotly that create
  // feedback loops (Plotly computes range → fires relayout → we detect zoom).
  let xLo, xHi;
  if (tMin != null && tMax != null) {
    // tMin/tMax are in display-coordinate space (relative seconds or epoch ms)
    xLo = tMin;
    xHi = tMax;
  } else {
    // Overview: use full signal time extent with 1% padding
    const range = getDisplayTimeRange();
    xLo = range.lo; xHi = range.hi;
    const pad = (xHi - xLo) * 0.01 || 1;
    xLo -= pad;
    xHi += pad;
  }
  const ticks = timeMode === 'absolute'
    ? _buildTimeTicks(xLo, xHi)
    : _buildRelativeTimeTicks(xLo, xHi);
  const xRangeProps = { range: [xLo, xHi], autorange: false, ...ticks };

  let traces, layout;

  if (plotMode === 'overlay') {
    traces = signals.map((sig, i) => ({
      x: getDisplayTime(sig), y: sig.values,
      name: legendLabel(sig),
      type: 'scattergl', mode: 'lines',
      line: { color: sig.color, width: 1.5 },
      hoverinfo: 'none'
    }));

    const yRange = computeYRange(signals.map(s => s.values));
    layout = {
      xaxis: _xAxisConfig({
        showspikes: true, spikemode: 'across', spikethickness: 1,
        spikecolor: '#999', spikesnap: 'cursor', spikedash: 'solid',
        ...xRangeProps
      }),
      yaxis: {
        ...PLOT_CONFIG.axis,
        title: { text: (signals.length === 1 && signals[0].units)
          ? fmtHtml(signals[0].units)
          : 'Value' },
        range: yRange, autorange: false
      },
      dragmode: 'zoom',
      plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
      font: PLOT_CONFIG.font,
      height: OVERLAY_HEIGHT,
      margin: PLOT_CONFIG.margin,
      hovermode: 'x', hoverdistance: -1,
      showlegend: true,
      legend: { x: 0.01, y: 0.99, ...PLOT_CONFIG.legend }
    };

  } else {
    // Subplots mode — NO matches:'x', explicit identical range on ALL axes
    const n = signals.length;
    const totalHeight = 100 + n * SUBPLOT_HEIGHT_PER;
    const gap = 0.08;
    const hPerSub = (1 - (n - 1) * gap) / n;

    traces = [];
    layout = {
      plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
      font: PLOT_CONFIG.font,
      height: totalHeight, margin: PLOT_CONFIG.margin,
      hovermode: 'x', hoverdistance: -1,
      showlegend: true,
      dragmode: 'zoom'
    };

    signals.forEach((sig, i) => {
      const yRange = computeYRange([sig.values]);
      const domBot = 1 - (i + 1) * hPerSub - i * gap;
      const domTop = domBot + hPerSub;

      const xKey = i === 0 ? 'xaxis' : `xaxis${i + 1}`;
      const yKey = i === 0 ? 'yaxis' : `yaxis${i + 1}`;
      const legendKey = i === 0 ? 'legend' : `legend${i + 1}`;

      // Every axis gets explicit identical range — no matches, full control
      layout[xKey] = _xAxisConfig({
        anchor: i === 0 ? 'y' : `y${i + 1}`,
        ...xRangeProps
      });
      const yLabel = sig.units ? fmtHtml(sig.units) : 'Value';
      layout[yKey] = {
        ...PLOT_CONFIG.axis,
        title: { text: yLabel },
        domain: [domBot, domTop], range: yRange, autorange: false,
        anchor: i === 0 ? 'x' : `x${i + 1}`
      };
      layout[legendKey] = {
        x: 0.01, y: domTop, xanchor: 'left', yanchor: 'top',
        ...PLOT_CONFIG.legend
      };

      traces.push({
        x: getDisplayTime(sig), y: sig.values,
        name: legendLabel(sig),
        type: 'scattergl', mode: 'lines',
        line: { color: sig.color, width: 1.5 },
        hoverinfo: 'none',
        xaxis: i === 0 ? 'x' : `x${i + 1}`,
        yaxis: i === 0 ? 'y' : `y${i + 1}`,
        legend: legendKey
      });
    });
  }

  // Record what range we're setting — onRelayout uses this to ignore
  // the "echo" event that Plotly fires after newPlot.
  _lastPlotRange = { lo: xLo, hi: xHi };


  // Purge old WebGL contexts then full newPlot for complete buffer refresh.
  Plotly.purge(el);
  Plotly.newPlot(el, traces, layout, _PLOTLY_CFG);

  // Re-attach event listeners (Plotly.newPlot purges them)
  el.on('plotly_hover', onHover);
  el.on('plotly_unhover', onUnhover);
  el.on('plotly_relayout', onRelayout);
  el.on('plotly_doubleclick', onDoubleClick);
  _plotEl = el;
}

function _updateZoomIndicator(state) {
  const resetBtn = document.getElementById('resetZoomBtn');
  if (!resetBtn) return;

  if (state === null || state === undefined) {
    resetBtn.style.display = 'none';
    return;
  }

  if (state === 'loading' || state === 'error') {
    resetBtn.style.display = 'inline-block';
  } else {
    const pct = Number(state);
    resetBtn.style.display = pct >= 99 ? 'none' : 'inline-block';
  }
}

// ── Hover ─────────────────────────────────────────────────────────────────

function onHover(ev) {
  if (!ev.points || ev.points.length === 0) return;

  const ptMap = {};
  ev.points.forEach(pt => { ptMap[pt.curveNumber] = pt.pointIndex; });

  const refCurve = ev.points[0].curveNumber;
  const refIdx   = ev.points[0].pointIndex;
  const refSig   = signals[refCurve];
  const refMs    = (refSig && refSig.timeRaw && refIdx < refSig.timeRaw.length)
                   ? refSig.timeRaw[refIdx] : null;

  signals.forEach((sig, i) => {
    const valEl  = document.getElementById(`cv-${i}`);
    const infoEl = document.getElementById(`chi-${i}`);
    const sampEl = document.getElementById(`cs-${i}`);
    if (!valEl) return;

    const tArr = sig.timeRaw;
    let j;

    if (ptMap[i] != null) {
      j = ptMap[i];
    } else if (refMs !== null && tArr && tArr.length > 0) {
      j = bsClosest(tArr, refMs);
    } else {
      j = -1;
    }

    const val = (j >= 0 && j < sig.values.length) ? sig.values[j] : undefined;

    let closeEnough = true;
    if (refMs !== null && tArr && tArr.length > 1 && j >= 0 && j < tArr.length) {
      const sigMs = tArr[j];
      const avgInterval = (tArr[tArr.length - 1] - tArr[0]) / (tArr.length - 1);
      closeEnough = Math.abs(sigMs - refMs) <= avgInterval * 2;
    }

    if (closeEnough && val !== undefined && val !== null && !Number.isNaN(val)) {
      valEl.textContent = formatNumber(val);
      if (infoEl && tArr && j < tArr.length) {
        infoEl.textContent = `t = ${formatEpochMs(tArr[j])}`;
      }
      if (sampEl) {
        // Show sample index in the FULL signal (not the downsampled view).
        // Compute from timestamp: proportional position within [tStart, tEnd].
        const tSpan = sig.tEnd - sig.tStart;
        const fullIdx = (tSpan > 0 && j < tArr.length)
          ? Math.round((tArr[j] - sig.tStart) / tSpan * (sig.totalSamples - 1))
          : j;
        sampEl.textContent = `sample = ${fullIdx.toLocaleString()}`;
      }
    } else {
      valEl.textContent = '--';
      if (infoEl) infoEl.textContent = '';
      if (sampEl) sampEl.textContent = '';
    }
  });

  // Synced vertical crosshair in subplot mode
  if (_plotEl && plotMode === 'subplots' && signals.length > 0) {
    const hoverXRaw = ev.points[0].x;
    const shapes = signals.map((_, i) => ({
      type: 'line',
      x0: hoverXRaw, x1: hoverXRaw, y0: 0, y1: 1,
      xref: i === 0 ? 'x' : `x${i + 1}`,
      yref: i === 0 ? 'y domain' : `y${i + 1} domain`,
      line: { color: '#999', width: 1 }
    }));
    Plotly.relayout(_plotEl, { shapes });
  }
}

function onUnhover() {
  signals.forEach((_, i) => {
    const valEl  = document.getElementById(`cv-${i}`);
    const infoEl = document.getElementById(`chi-${i}`);
    const sampEl = document.getElementById(`cs-${i}`);
    if (valEl)  valEl.textContent = '--';
    if (infoEl) infoEl.textContent = '';
    if (sampEl) sampEl.textContent = '';
  });

  if (_plotEl && plotMode === 'subplots') {
    Plotly.relayout(_plotEl, { shapes: [] });
  }
}

// ── State persistence ─────────────────────────────────────────────────────

function saveState() {
  try {
    sessionStorage.setItem('viewerState', JSON.stringify({
      signals: signals.map(s => ({
        batch: s.batch, idx: s.idx, name: s.name, units: s.units,
        timeRaw: s.timeRaw, values: s.values,
        totalSamples: s.totalSamples, tStart: s.tStart, tEnd: s.tEnd
      })),
      plotMode
    }));
  } catch (e) {
    // If storage is full, save without the bulky arrays
    try {
      sessionStorage.setItem('viewerState', JSON.stringify({
        signals: signals.map(s => ({
          batch: s.batch, idx: s.idx, name: s.name, units: s.units,
          totalSamples: s.totalSamples, tStart: s.tStart, tEnd: s.tEnd
        })),
        plotMode,
        _needsReload: true
      }));
    } catch (_) {
      console.warn('viewerState save failed (storage full)');
    }
  }
}

async function restoreState() {
  const raw = sessionStorage.getItem('viewerState');
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    if (state.plotMode) {
      plotMode = state.plotMode;
      const sel = document.getElementById('layoutSelect');
      if (sel) sel.value = plotMode;
    }
    if (state.signals && state.signals.length > 0) {
      if (state._needsReload) {
        for (const s of state.signals) {
          await addSignal(s.batch, s.idx, s.name, s.units);
        }
      } else {
        state.signals.forEach((s, i) => {
          const raw = s.timeRaw || s.time;
          if (raw && s.values) {
            signals.push({
              batch: s.batch, idx: s.idx, name: s.name, units: s.units,
              timeRaw: raw,
              values: s.values,
              totalSamples: s.totalSamples || s.values.length,
              tStart: s.tStart || raw[0],
              tEnd: s.tEnd || raw[raw.length - 1],
              color: getSignalColor(i)
            });
          }
        });
        if (signals.length > 0) renderAll();
      }
    }
  } catch (e) {
    console.warn('viewerState restore failed:', e);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  if (GlobalNav._ready) await GlobalNav._ready;

  GlobalNav.onSidebarSignalClick = (batch, idx, name, units) => {
    // Toggle: if already loaded, remove it; otherwise add it
    const key = `${batch}::${idx}`;
    const existingIdx = signals.findIndex(s => `${s.batch}::${s.idx}` === key);
    if (existingIdx !== -1) {
      removeSignal(existingIdx);
    } else {
      addSignal(batch, idx, name, units);
    }
  };

  GlobalNav.onSelectionChange = function () {
    signals.length = 0;
    _cancelZoom();
    _lastFetchedRange = null;
    renderAll();
  };

  await restoreState();
  if (signals.length === 0) renderPlot();
});
</script>
