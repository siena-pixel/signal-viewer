{% extends "base.html" %}
{% block title %}Analysis - Signal Viewer{% endblock %}
{% block content %}

<!-- No module-header on analysis — all content scrolls -->
<div class="module-content">
  <!-- Empty state -->
  <div id="analysisEmpty" class="card text-center" style="padding:3rem">
    <p class="text-muted">Select a file and click a signal in the sidebar to begin analysis.</p>
  </div>

  <!-- Analysis content (hidden until signal selected) -->
  <div id="analysisContent" class="hidden">

    <!-- Section title: batch / signal name -->
    <h2 id="analysisSectionTitle" class="analysis-section-title"></h2>

    <!-- Row 1: Summary stats + Value histogram -->
    <div class="analysis-row">
      <!-- Summary stats card -->
      <div class="analysis-stats-card card">
        <div class="card-header"><h3>Signal Statistics</h3></div>
        <div class="card-body">
          <div id="statsGrid" class="stats-list"></div>
        </div>
      </div>

      <!-- Value histogram -->
      <div class="analysis-hist-card card">
        <div class="card-body" style="padding:0">
          <div id="histogramPlot" class="plot-area" style="width:100%;min-height:340px"></div>
        </div>
      </div>
    </div>

    <!-- Row 2: Rainflow cycle counting -->
    <div class="analysis-row" style="margin-top:var(--spacing-lg)">
      <!-- Rainflow summary + percentile table -->
      <div class="analysis-stats-card card">
        <div class="card-header"><h3>Rainflow Cycle Counting</h3></div>
        <div class="card-body">
          <div id="rainflowSummary" class="stats-list"></div>
          <div id="rainflowTable"></div>
        </div>
      </div>

      <!-- Rainflow histogram + Exceedance plot stacked -->
      <div class="analysis-hist-card card">
        <div class="card-body" style="padding:0">
          <div id="rainflowPlot" class="plot-area" style="width:100%;min-height:340px"></div>
          <div id="exceedancePlot" class="plot-area" style="width:100%;min-height:340px"></div>
          <div id="maxMinExceedancePlot" class="plot-area" style="width:100%;min-height:340px"></div>
        </div>
      </div>
    </div>

  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// ============================================================================
// ANALYSIS MODULE
// ============================================================================

let currentSignal = { batch: null, idx: null, name: '', units: '' };
let lastStatsResult = null;
let lastHistValues = null;

const FMT_DECIMALS = 6;

function fmtVal(v) {
  if (v == null || isNaN(v)) return 'N/A';
  const abs = Math.abs(v);
  if (abs >= 1e6 || (abs < 1e-3 && abs !== 0)) return v.toExponential(FMT_DECIMALS);
  return v.toFixed(FMT_DECIMALS);
}

// ── Load stats from backend ───────────────────────────────────────────────

async function loadAnalysis(batch, idx, name, units) {
  currentSignal = { batch, idx, name, units };
  updateUI();

  try {
    showLoading('Computing statistics\u2026');

    // Single combined request: stats + rainflow vis + downsampled values
    const result = await apiPost('/api/analysis/stats', {
      file_path: GlobalNav.filePath,
      batch: batch,
      signal_idx: idx,
      rainflow_bins: 10,
      include_signal: 5000
    });
    hideLoading();

    lastStatsResult = result;
    lastHistValues = result.values || null;

    renderStats(result);
    if (lastHistValues) renderHistogram(lastHistValues, units);
    renderRainflowFromServer(result.rainflow, units);
    GlobalNav.updateSidebarHighlights([
      { batch, idx, color: '#0077cc' }
    ]);
    saveAnalysisState();
  } catch (err) {
    hideLoading();
    showToast(`Stats failed: ${err.message}`, 'error');
  }
}

// ── Render summary stats (one value per row) ─────────────────────────────

function renderStats(data) {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';

  const items = [
    { key: 'max',          label: 'Maximum' },
    { key: 'min',          label: 'Minimum' },
    { key: 'peak_to_peak', label: 'Peak-to-Peak' }
  ];

  items.forEach(({ key, label }) => {
    grid.appendChild(statRow(label, fmtVal(data[key]), currentSignal.units));
  });
}

// ── Render rainflow from server pre-computed visualisation data ───────────

/**
 * Render rainflow section using the server's pre-computed vis payload.
 * The server sends: counts, bin_edges, percentiles[], exceedance curves,
 * maxRange, total_cycles, total_half_cycles — NO raw ranges/maxs/mins.
 */
function renderRainflowFromServer(rf, units) {
  const summary = document.getElementById('rainflowSummary');
  const tableEl = document.getElementById('rainflowTable');
  summary.innerHTML = '';
  tableEl.innerHTML = '';

  if (!rf) return;

  summary.appendChild(statRow('Total Full Cycles', rf.total_cycles));
  if (rf.maxRange !== null && rf.maxRange !== undefined) {
    summary.appendChild(statRow('Max Cycle Range', fmtVal(rf.maxRange), units));
  }

  // Percentile table (pre-computed by server)
  if (rf.percentiles && rf.percentiles.length > 0) {
    const unitStr = units ? ' (' + fmtHtml(units) + ')' : '';
    const table = document.createElement('table');
    table.className = 'percentile-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th>Percentile</th>
          <th>Cycle Range${unitStr}</th>
          <th>Cycles \u2265 Value</th>
        </tr>
      </thead>
      <tbody>
        ${rf.percentiles.map(r => `
          <tr>
            <td>${r.percentile}th</td>
            <td class="mono">${fmtVal(r.value)}</td>
            <td class="mono">${r.count}</td>
          </tr>
        `).join('')}
      </tbody>
    `;
    tableEl.appendChild(table);
  }

  renderRainflowHistogram(rf, units);
  renderExceedance(rf.rangeExceedance, units);
  renderMaxMinExceedance(rf.maxExceedance, rf.minExceedance, units);
}

/**
 * Restore all rainflow visuals from saved state.
 * The server response and the sessionStorage cache share the same shape
 * (counts, bin_edges, percentiles, exceedance curves, maxRange, totals),
 * so this simply delegates to renderRainflowFromServer.
 */
function renderRainflowFromCache(cache, units) {
  renderRainflowFromServer(cache, units);
}

// ── Render exceedance plot (cycles exceeding a given range) ──────────────

const _EMPTY_PLOT_OPTS = { responsive: true };

function _emptyAnnotation(el, text) {
  Plotly.newPlot(el, [], {
    annotations: [{
      text: text, xref: 'paper', yref: 'paper',
      x: 0.5, y: 0.5, showarrow: false,
      font: { size: 13, color: '#8e90a6' }
    }],
    xaxis: { visible: false }, yaxis: { visible: false },
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    margin: { l: 20, r: 20, t: 20, b: 20 }
  }, { ...(_EMPTY_PLOT_OPTS), displaylogo: false, showLink: false });
}

/**
 * Render cycle-range exceedance plot.
 * @param {Object|null} curve  { x: [counts], y: [range values] }
 * @param {string} units
 */
function renderExceedance(curve, units) {
  const el = document.getElementById('exceedancePlot');

  if (!curve || !curve.x || curve.x.length === 0) {
    _emptyAnnotation(el, 'No rainflow cycles for exceedance plot');
    return;
  }

  const unitLabel = units ? ' (' + fmtHtml(units) + ')' : '';

  const trace = {
    x: curve.x, y: curve.y,
    type: 'scatter',
    mode: 'lines+markers',
    line: { color: '#6a1b9a', width: 2 },
    marker: { color: '#6a1b9a', size: 5 },
    fill: 'tozerox',
    fillcolor: 'rgba(106,27,154,0.10)',
    hovertemplate: 'Cycles \u2265 range: %{x}<br>Range: %{y:.4f}' + unitLabel + '<extra></extra>'
  };

  const layout = {
    title: { text: 'Range Exceedance', font: { size: 14, color: '#1a1a2e' } },
    xaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: 'Cumulative Cycle Count' },
      type: 'log',
      rangemode: 'tozero'
    },
    yaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: `Cycle Range${unitLabel}` },
      rangemode: 'tozero'
    },
    margin: { l: 64, r: 24, t: 48, b: 56 },
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    hovermode: 'closest', showlegend: false
  };

  Plotly.newPlot(el, [trace], layout, { ...(_EMPTY_PLOT_OPTS), displaylogo: false, showLink: false });
}

// ── Render cycle max / min exceedance plot ────────────────────────────────

/**
 * Render max-of-cycle and min-of-cycle exceedance on the same plot.
 * @param {Object|null} maxCurve  { x: [counts], y: [max values] }
 * @param {Object|null} minCurve  { x: [counts], y: [min values] }
 * @param {string} units
 */
function renderMaxMinExceedance(maxCurve, minCurve, units) {
  const el = document.getElementById('maxMinExceedancePlot');

  if ((!maxCurve || !maxCurve.x || maxCurve.x.length === 0) &&
      (!minCurve || !minCurve.x || minCurve.x.length === 0)) {
    _emptyAnnotation(el, 'No cycle max/min data for exceedance plot');
    return;
  }

  const unitLabel = units ? ' (' + fmtHtml(units) + ')' : '';
  const traces = [];

  if (maxCurve && maxCurve.x && maxCurve.x.length > 0) {
    traces.push({
      x: maxCurve.x, y: maxCurve.y,
      type: 'scatter',
      mode: 'lines+markers',
      name: 'Cycle Max',
      line: { color: '#d32f2f', width: 2 },
      marker: { color: '#d32f2f', size: 4 },
      hovertemplate: 'Cycles with max \u2265 %{y:.4f}: %{x}<extra>Cycle Max</extra>'
    });
  }

  if (minCurve && minCurve.x && minCurve.x.length > 0) {
    traces.push({
      x: minCurve.x, y: minCurve.y,
      type: 'scatter',
      mode: 'lines+markers',
      name: 'Cycle Min',
      line: { color: '#1565c0', width: 2 },
      marker: { color: '#1565c0', size: 4 },
      hovertemplate: 'Cycles with min \u2264 %{y:.4f}: %{x}<extra>Cycle Min</extra>'
    });
  }

  const layout = {
    title: { text: 'Cycle Max / Min Exceedance', font: { size: 14, color: '#1a1a2e' } },
    xaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: 'Cumulative Cycle Count' },
      type: 'log',
      rangemode: 'tozero'
    },
    yaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: `Value${unitLabel}` },
      rangemode: 'normal'
    },
    margin: { l: 64, r: 24, t: 48, b: 56 },
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    hovermode: 'closest',
    showlegend: true,
    legend: { x: 1, xanchor: 'right', y: 1, bgcolor: 'rgba(255,255,255,0.8)' }
  };

  Plotly.newPlot(el, traces, layout, { ...(_EMPTY_PLOT_OPTS), displaylogo: false, showLink: false });
}

function renderRainflowHistogram(rf, units) {
  const el = document.getElementById('rainflowPlot');

  if (!rf || !rf.counts || rf.counts.length === 0) {
    Plotly.newPlot(el, [], {
      annotations: [{
        text: 'No rainflow cycles detected', xref: 'paper', yref: 'paper',
        x: 0.5, y: 0.5, showarrow: false,
        font: { size: 13, color: '#8e90a6' }
      }],
      xaxis: { visible: false }, yaxis: { visible: false },
      plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
      margin: { l: 20, r: 20, t: 20, b: 20 }
    }, { responsive: true, displaylogo: false, showLink: false });
    return;
  }

  const edges = rf.bin_edges || [];
  const counts = rf.counts || [];
  const labels = [];
  for (let i = 0; i < counts.length; i++) {
    if (edges.length > i + 1) {
      labels.push(((edges[i] + edges[i + 1]) / 2).toFixed(FMT_DECIMALS));
    } else {
      labels.push(`Bin ${i + 1}`);
    }
  }

  const unitLabel = units ? ' (' + fmtHtml(units) + ')' : '';

  const trace = {
    x: labels, y: counts,
    type: 'bar',
    marker: { color: '#e65100', opacity: 0.85 },
    hovertemplate: 'Range: %{x}' + unitLabel + '<br>Cycles: %{y}<extra></extra>'
  };

  const layout = {
    title: { text: 'Cycle Range Distribution', font: { size: 14, color: '#1a1a2e' } },
    xaxis: {
      ...PLOT_CONFIG.axis,
      title: { text: `Cycle Range${unitLabel}` },
      tickangle: -45, tickfont: { size: 10 }
    },
    yaxis: { ...PLOT_CONFIG.axis, title: { text: 'Cycle Count' } },
    margin: { l: 56, r: 24, t: 48, b: 80 },
    plot_bgcolor: PLOT_CONFIG.bg, paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    hovermode: 'closest', showlegend: false, bargap: 0.15
  };

  Plotly.newPlot(el, [trace], layout, { responsive: true, displaylogo: false, showLink: false });
}

// ── Render value histogram ───────────────────────────────────────────────

function renderHistogram(values, units) {
  const el = document.getElementById('histogramPlot');
  const unitLabel = units ? ' (' + fmtHtml(units) + ')' : '';

  const trace = {
    x: values,
    type: 'histogram',
    nbinsx: 50,
    marker: { color: '#0077cc', opacity: 0.8 }
  };

  const layout = {
    title: { text: 'Value Distribution', font: { size: 14, color: '#1a1a2e' } },
    xaxis: { ...PLOT_CONFIG.axis, title: { text: `Value${unitLabel}` } },
    yaxis: { ...PLOT_CONFIG.axis, title: { text: 'Count' } },
    margin: { l: 56, r: 24, t: 48, b: 56 },
    plot_bgcolor: PLOT_CONFIG.bg,
    paper_bgcolor: PLOT_CONFIG.paperBg,
    font: PLOT_CONFIG.font,
    hovermode: 'closest', showlegend: false
  };

  Plotly.newPlot(el, [trace], layout, { responsive: true, displaylogo: false, showLink: false });
}

// ── Helpers ──────────────────────────────────────────────────────────────

function statRow(label, value, unit) {
  const el = document.createElement('div');
  el.className = 'stat-row';
  const unitSpan = unit ? `<span class="stat-unit">${fmtHtml(unit)}</span>` : '';
  el.innerHTML = `
    <span class="stat-row-label">${escapeHtml(label)}</span>
    <span class="stat-row-value">${escapeHtml(String(value))}${unitSpan}</span>
  `;
  return el;
}

// ── UI management ─────────────────────────────────────────────────────────

function updateUI() {
  const empty   = document.getElementById('analysisEmpty');
  const content = document.getElementById('analysisContent');
  const title   = document.getElementById('analysisSectionTitle');

  if (currentSignal.batch !== null && currentSignal.idx !== null) {
    empty.classList.add('hidden');
    content.classList.remove('hidden');
    // Section title: batch / signal name
    title.textContent = [currentSignal.batch, currentSignal.name].filter(Boolean).join(' / ');
  } else {
    empty.classList.remove('hidden');
    content.classList.add('hidden');
  }
}

// ── State persistence ─────────────────────────────────────────────────────

/**
 * Build an exceedance curve: "how many cycles have value >= threshold?"
 * Sorts descending.  Returns { x: [counts], y: [thresholds] }.
 */
function _buildExceedanceCurveDesc(values) {
  const sorted = values.slice().sort((a, b) => b - a);
  const n = sorted.length;
  const thresholds = [], counts = [];
  let prev = null;
  for (let i = 0; i < n; i++) {
    if (sorted[i] !== prev) {
      thresholds.push(sorted[i]);
      counts.push(i + 1);
      prev = sorted[i];
    }
  }
  if (counts.length > 0 && counts[counts.length - 1] !== n) {
    thresholds.push(sorted[n - 1]);
    counts.push(n);
  }
  return { x: counts, y: thresholds };
}

/**
 * Build an exceedance curve: "how many cycles have value <= threshold?"
 * Sorts ascending.  Returns { x: [counts], y: [thresholds] }.
 */
function _buildExceedanceCurveAsc(values) {
  const sorted = values.slice().sort((a, b) => a - b);
  const n = sorted.length;
  const thresholds = [], counts = [];
  let prev = null;
  for (let i = 0; i < n; i++) {
    if (sorted[i] !== prev) {
      thresholds.push(sorted[i]);
      counts.push(i + 1);
      prev = sorted[i];
    }
  }
  if (counts.length > 0 && counts[counts.length - 1] !== n) {
    thresholds.push(sorted[n - 1]);
    counts.push(n);
  }
  return { x: counts, y: thresholds };
}

/**
 * Downsample an exceedance curve to at most maxPts points.
 * Uses log-spaced sampling on the x-axis (cycle counts) since the plot
 * uses a log x-axis.  Always keeps the first and last point.
 */
function _downsampleCurve(curve, maxPts) {
  if (!curve || !curve.x || curve.x.length <= maxPts) return curve;
  const n = curve.x.length;
  const indices = new Set();
  indices.add(0);
  indices.add(n - 1);
  // Log-spaced indices between first and last
  const logMin = Math.log(1);
  const logMax = Math.log(n);
  for (let i = 1; i < maxPts - 1; i++) {
    const logIdx = logMin + (logMax - logMin) * i / (maxPts - 1);
    const idx = Math.min(Math.round(Math.exp(logIdx)) - 1, n - 1);
    indices.add(idx);
  }
  const sorted = Array.from(indices).sort((a, b) => a - b);
  return {
    x: sorted.map(i => curve.x[i]),
    y: sorted.map(i => curve.y[i])
  };
}

/** Max points per exceedance curve stored in sessionStorage. */
const _MAX_CACHE_CURVE_PTS = 500;

/**
 * Pre-compute everything needed to restore plots from rainflow data.
 * Exceedance curves are downsampled to _MAX_CACHE_CURVE_PTS to keep
 * the sessionStorage payload small (well under 5 MB even for huge signals).
 */
function _precomputeRainflowCache(rf) {
  if (!rf) return null;

  // Percentile table data
  const percentiles = [];
  if (rf.ranges && rf.ranges.length > 0) {
    const sorted = rf.ranges.slice().sort((a, b) => a - b);
    const n = sorted.length;
    for (let p = 10; p <= 100; p += 10) {
      const idx = Math.min(Math.floor((p / 100) * n), n - 1);
      const val = sorted[idx];
      let count = 0;
      for (let j = 0; j < n; j++) {
        if (sorted[j] >= val) { count = n - j; break; }
      }
      percentiles.push({ percentile: p, value: val, count: count });
    }
  }

  // Max range
  let maxRange = null;
  if (rf.ranges && rf.ranges.length > 0) {
    maxRange = -Infinity;
    for (let i = 0; i < rf.ranges.length; i++) {
      if (rf.ranges[i] > maxRange) maxRange = rf.ranges[i];
    }
  }

  // Exceedance curves — downsample for storage
  const rangeExceedance = (rf.ranges && rf.ranges.length > 0)
    ? _downsampleCurve(_buildExceedanceCurveDesc(rf.ranges), _MAX_CACHE_CURVE_PTS) : null;
  const maxExceedance = (rf.cycle_maxs && rf.cycle_maxs.length > 0)
    ? _downsampleCurve(_buildExceedanceCurveDesc(rf.cycle_maxs), _MAX_CACHE_CURVE_PTS) : null;
  const minExceedance = (rf.cycle_mins && rf.cycle_mins.length > 0)
    ? _downsampleCurve(_buildExceedanceCurveAsc(rf.cycle_mins), _MAX_CACHE_CURVE_PTS) : null;

  return {
    total_cycles: rf.total_cycles,
    total_half_cycles: rf.total_half_cycles,
    counts: rf.counts,
    bin_edges: rf.bin_edges,
    maxRange: maxRange,
    percentiles: percentiles,
    rangeExceedance: rangeExceedance,
    maxExceedance: maxExceedance,
    minExceedance: minExceedance
  };
}

function saveAnalysisState() {
  try {
    // The server response is already compact (no raw ranges/cycle arrays),
    // so we can save it directly.  Only histValues (≤5000 floats) adds bulk.
    const payload = JSON.stringify({
      signal: currentSignal,
      stats: lastStatsResult,
      histValues: lastHistValues
    });
    sessionStorage.setItem('analysisState', payload);
  } catch (e) {
    // Fallback: save without histogram values
    console.warn('analysisState save: retrying without histValues:', e);
    try {
      sessionStorage.setItem('analysisState', JSON.stringify({
        signal: currentSignal,
        stats: lastStatsResult,
        histValues: null
      }));
    } catch (e2) {
      console.warn('analysisState save failed:', e2);
    }
  }
}

function restoreAnalysisState() {
  const raw = sessionStorage.getItem('analysisState');
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    if (!state.signal || state.signal.batch === null) return;

    currentSignal = state.signal;
    updateUI();

    if (state.stats) {
      lastStatsResult = state.stats;
      renderStats(state.stats);

      // The rainflow data (from server or cache) uses the same shape
      if (state.stats.rainflow) {
        renderRainflowFromCache(state.stats.rainflow, currentSignal.units);
      }
    }
    if (state.histValues) {
      lastHistValues = state.histValues;
      renderHistogram(state.histValues, currentSignal.units);
    }

    GlobalNav.updateSidebarHighlights([
      { batch: currentSignal.batch, idx: currentSignal.idx, color: '#0077cc' }
    ]);
  } catch (e) {
    console.warn('analysisState restore failed:', e);
    sessionStorage.removeItem('analysisState');
  }
}

// ── Clear all analysis state ──────────────────────────────────────────────

function clearAnalysis() {
  currentSignal = { batch: null, idx: null, name: '', units: '' };
  lastStatsResult = null;
  lastHistValues = null;

  document.getElementById('statsGrid').innerHTML = '';
  document.getElementById('rainflowSummary').innerHTML = '';
  document.getElementById('rainflowTable').innerHTML = '';

  ['histogramPlot', 'rainflowPlot', 'exceedancePlot', 'maxMinExceedancePlot'].forEach(function (id) {
    var el = document.getElementById(id);
    if (el) Plotly.purge(el);
  });

  updateUI();
}

// ── Init ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  if (GlobalNav._ready) await GlobalNav._ready;

  GlobalNav.onSidebarSignalClick = (batch, idx, name, units) => {
    // Toggle: if same signal already selected, deselect it
    if (currentSignal.batch === batch && currentSignal.idx === idx) {
      clearAnalysis();
    } else {
      loadAnalysis(batch, idx, name, units);
    }
  };

  GlobalNav.onSelectionChange = clearAnalysis;

  restoreAnalysisState();
});
</script>
{% endblock %}
